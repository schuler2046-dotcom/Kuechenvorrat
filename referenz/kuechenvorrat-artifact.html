<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Küchenvorrat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1E2A20;
    --bg-soft: #253527;
    --surface: #EFE6D6;
    --surface-alt: #E2D5BC;
    --ink: #241C14;
    --ink-soft: #6B6152;
    --accent: #C17817;
    --accent-deep: #8C5410;
    --good: #5B7A52;
    --good-bg: #DCE6D6;
    --missing: #A3402E;
    --missing-bg: #F3DAD3;
    --divider: #C7B896;
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  body{ margin:0; background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }
  #app{ max-width: 980px; margin: 0 auto; padding: 28px 20px 80px; }

  .app-header{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .app-header h1{ font-family:'Fraunces', serif; font-weight:700; font-size: 30px; color: var(--surface); margin:0; letter-spacing: 0.2px; }
  .app-header p{ margin:2px 0 0; color: #B9C4B4; font-size: 13px; }
  .sync-row{ display:flex; align-items:center; gap:10px; }
  .sync-time{ color:#9DB194; font-size:12px; }
  .refresh-btn{ background: var(--bg-soft); color: var(--surface); border: 1px solid #3A4E3C; border-radius: 8px; padding: 6px 12px; font-size: 12.5px; cursor:pointer; font-family:'IBM Plex Sans'; }
  .refresh-btn:hover{ background:#2F4230; }
  .status-banner{ font-size: 12px; color:#E6C08A; margin: 4px 0 16px; min-height: 16px; }

  nav.tabs{ display:flex; gap: 6px; margin-bottom: 22px; border-bottom: 2px solid var(--bg-soft); flex-wrap: wrap; }
  nav.tabs button{ font-family:'Fraunces', serif; font-weight:600; font-size:15px; background: var(--bg-soft); color: #C9D2C4; border:none; padding: 10px 18px; border-radius: 10px 10px 0 0; cursor:pointer; transform: translateY(2px); transition: all .15s ease; }
  nav.tabs button.active{ background: var(--surface); color: var(--ink); transform: translateY(0); }
  nav.tabs button:hover:not(.active){ background:#2C3F2E; color:var(--surface); }

  .panel{ display:none; }
  .panel.active{ display:block; }

  .card{ background: var(--surface); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 16px; box-shadow: 0 3px 0 var(--divider); }
  .card h2{ font-family:'Fraunces', serif; font-size:19px; margin:0 0 12px; }
  .card h3{ font-family:'Fraunces', serif; font-size:16px; margin: 0 0 10px; color: var(--ink); }

  .loc-grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap:14px; }
  .loc-block{ background: var(--surface-alt); border-radius: 12px; padding: 14px 14px 8px; }
  .loc-label{ display:inline-block; font-family:'Fraunces', serif; font-weight:600; font-size:13px; background: var(--accent); color:#fff; padding: 3px 10px; border-radius: 20px; margin-bottom:10px; }
  .item-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding: 7px 0; border-bottom: 1px dashed var(--divider); font-size:14px; }
  .item-row:last-child{ border-bottom:none; }
  .item-name{ font-weight:500; }
  .item-qty{ display:inline-flex; align-items:center; justify-content:center; min-width: 30px; height:24px; padding:0 6px; border-radius:50%; background: var(--surface); border:2px solid var(--accent); font-size:12px; font-weight:600; color: var(--accent-deep); font-family:'IBM Plex Sans'; flex-shrink:0; }
  .item-actions button{ background:none; border:none; cursor:pointer; font-size:15px; color: var(--ink-soft); padding: 2px 5px; }
  .item-actions button:hover{ color: var(--missing); }
  .empty-note{ color: var(--ink-soft); font-size: 13px; font-style: italic; padding: 4px 0; }

  .add-row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top: 6px;}
  input[type=text], input[type=number], select, textarea{ font-family:'IBM Plex Sans'; font-size:14px; padding: 8px 10px; border-radius:8px; border: 1.5px solid var(--divider); background:#fff; color:var(--ink); }
  input[type=text]{ flex:1; min-width:120px; }
  textarea{ width:100%; resize:vertical; }
  .qty-input{ width:70px; }
  .unit-input{ width:80px; }
  button.btn{ font-family:'Fraunces', serif; font-weight:600; font-size:14px; cursor:pointer; background: var(--accent); color:#fff; border:none; padding: 8px 16px; border-radius:8px; transition: background .15s ease; }
  button.btn:hover{ background: var(--accent-deep); }
  button.btn.secondary{ background: var(--bg-soft); color:var(--surface); }
  button.btn.secondary:hover{ background:#33472F; }
  button.btn.small{ padding:5px 11px; font-size:12.5px; }
  button.btn:disabled{ opacity:.55; cursor:default; }

  .tag-chip{ display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:500; background: var(--surface-alt); border:1.5px solid var(--divider); color:var(--ink-soft); padding: 4px 10px; border-radius: 20px; cursor:pointer; margin: 2px 4px 2px 0; user-select:none; }
  .tag-chip.selected{ background: var(--accent); border-color:var(--accent); color:#fff; }

  .recipe-card{ background: var(--surface-alt); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; position:relative; }
  .recipe-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;}
  .recipe-title{ font-family:'Fraunces', serif; font-weight:600; font-size:17px; margin:0; }
  .avail-badge{ font-size:12px; font-weight:600; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .avail-badge.full{ background: var(--good-bg); color: var(--good); }
  .avail-badge.partial{ background:#F3E9CE; color:#8C6B10; }
  .avail-badge.none{ background: var(--missing-bg); color: var(--missing); }
  .ing-list{ list-style:none; padding:0; margin: 8px 0 0; font-size:13.5px; }
  .ing-list li{ padding: 2px 0; }
  .ing-list li.have:before{ content:"\25CF "; color: var(--good); }
  .ing-list li.miss:before{ content:"\25CF "; color: var(--missing); }
  .recipe-notes{ font-size:13px; color:var(--ink-soft); margin-top:6px; font-style:italic; }
  .recipe-tags{ margin-top:6px; }
  .recipe-tag{ display:inline-block; font-size:11.5px; background:var(--bg-soft); color:var(--surface); padding:2px 8px; border-radius:10px; margin: 2px 4px 0 0; }
  .recipe-controls{ margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }

  .new-recipe-form{ display:flex; flex-direction:column; gap:10px; }
  .ing-form-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:6px; }
  .ing-form-row input[type=text]{ flex:2; min-width:100px; }
  .paste-box{ background:var(--surface-alt); border-radius:10px; padding:10px 12px; }
  .paste-hint{ font-size:12px; color:var(--ink-soft); margin: 4px 0 8px; }

  .day-block{ background: var(--surface-alt); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .day-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .day-name{ font-family:'Fraunces', serif; font-weight:600; font-size:15px; min-width:80px; }
  .shopping-list{ list-style:none; padding:0; margin:0; }
  .shopping-list li{ display:flex; align-items:center; gap:8px; padding:5px 0; font-size:14px; border-bottom:1px dashed var(--divider); }
  .shopping-list li:last-child{ border-bottom:none; }

  .status-line{ font-size:12px; color:#9DB194; margin-top: -6px; margin-bottom: 14px; }
  .loading{ color:#B9C4B4; font-family:'Fraunces',serif; padding: 40px 0; text-align:center; }

  .ai-box{ background: var(--surface-alt); border-radius:12px; padding:14px 16px; margin-top: 8px; }
  .ai-suggestion{ background:#fff; border-radius:10px; padding:12px 14px; margin-top:10px; border: 1.5px dashed var(--accent); }
  .ai-error{ color: var(--missing); font-size:13px; margin-top:8px; }
  .ai-loading{ color: var(--ink-soft); font-size:13px; margin-top:8px; font-style: italic; }

  @media (max-width: 560px){
    nav.tabs button{ padding: 8px 12px; font-size:13.5px; }
    .app-header h1{ font-size:24px; }
  }
</style>
</head>

  ], notes: 'Reis vom Vortag scharf anbraten, Gemüse und Ei unterheben, mit Sojasauce würzen.' },
  { name: 'Falafel mit Salat', tags: ['vegan','proteinreich','mit Gemüse'], ingredients: [
    {name:'Kichererbsen', amount:'1', unit:'Dose'}, {name:'Petersilie', amount:'1', unit:'Bund'},
    {name:'Knoblauch', amount:'2', unit:'Zehen'}, {name:'Salat', amount:'1', unit:'Kopf'},
    {name:'Joghurt', amount:'150', unit:'g'}

let inventory = [];
let recipes = [];
let weekplan = {};
let activeTab = 'vorrat';
let recipeFilterTags = [];
let ready = false;
let lastSync = null;
let statusMsg = '';
let draftIngredients = [];
let aiState = { loading:false, error:'', suggestion:null };
let shoppingState = { rawText:'', parsing:false, error:'', items:null, dictationMsg:'' };

const KNOWN_UNITS = ['g','kg','ml','l','tl','el','stk','stück','dose','dosen','packung','prise','bund','zehe','zehen','stange','scheibe','scheiben'];

function uid(){ return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8); }

async function loadKey(key, fallback){
  try{
    const res = await window.storage.get(key, true);
    if(res && res.value) return JSON.parse(res.value);
    return fallback;
  }catch(e){ return fallback; }
}
async function saveKey(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), true); return true; }
  catch(e){ console.error('Speichern fehlgeschlagen fuer', key, e); return false; }
}

async function mutateShared(key, fallback, mutator){
  let current;
  try{
    const res = await window.storage.get(key, true);
    current = res && res.value ? JSON.parse(res.value) : fallback;
  }catch(e){ current = fallback; }
  const updated = mutator(current);
  const ok = await saveKey(key, updated);
  if(!ok){ statusMsg = 'Aenderung konnte nicht gespeichert werden. Bitte kurz erneut versuchen.'; }
  else { statusMsg = ''; lastSync = new Date(); }
  return updated;
}

function inputFocused(){
  const a = document.activeElement;
  return a && ['INPUT','TEXTAREA','SELECT'].includes(a.tagName);
}

async function loadAll(){
  inventory = await loadKey('vorrat-inventory', []);
  recipes = await loadKey('vorrat-recipes', []);
  weekplan = await loadKey('vorrat-weekplan', {});
  await ensureSeedRecipes();
  lastSync = new Date();
  ready = true;
  render();
}

async function ensureSeedRecipes(){
  const seeded = await loadKey('vorrat-seeded-v1', false);
  if(seeded) return;
  if(recipes.length === 0){
    recipes = await mutateShared('vorrat-recipes', [], (list) => {
      if(list.length === 0){
        return STARTER_RECIPES.map(r => ({ id: uid(), name:r.name, tags:r.tags, ingredients:r.ingredients, notes:r.notes }));
      }
      return list;
    });
  }
  await saveKey('vorrat-seeded-v1', true);
}

async function refreshFromServer(force){
  if(!force && inputFocused()) return;
  inventory = await loadKey('vorrat-inventory', inventory);
  recipes = await loadKey('vorrat-recipes', recipes);
  weekplan = await loadKey('vorrat-weekplan', weekplan);
  lastSync = new Date();
  render();
}

function ingredientAvailable(ingName){
  const q = ingName.trim().toLowerCase();
  if(!q) return false;
  return inventory.some(item => {
    const n = item.name.trim().toLowerCase();
    return n.includes(q) || q.includes(n);
  });
}

function missingIngredients(recipe){
  return recipe.ingredients.filter(ing => !ingredientAvailable(ing.name));
}

function availabilityBadge(recipe){
  const total = recipe.ingredients.length;
  if(total === 0) return {cls:'partial', text:'keine Zutaten hinterlegt'};
  const missing = missingIngredients(recipe).length;
  const have = total - missing;
  if(missing === 0) return {cls:'full', text: 'alles da'};
  if(have === 0) return {cls:'none', text: have + ' von ' + total + ' vorraetig'};
  return {cls:'partial', text: have + ' von ' + total + ' vorraetig'};
}

function fmtTime(d){
  if(!d) return '-';
  return d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function parseIngredientLine(line){
  const tokens = line.trim().split(/\s+/).filter(Boolean);
  if(tokens.length === 0) return null;
  const first = tokens[0].replace(',', '.');
  if(/^[\d.\/]+$/.test(first)){
    const second = (tokens[1] || '').toLowerCase().replace(/[.,]$/,'');
    if(tokens.length > 2 && KNOWN_UNITS.includes(second)){
      return { name: tokens.slice(2).join(' '), amount: tokens[0], unit: tokens[1] };
    }
    return { name: tokens.slice(1).join(' '), amount: tokens[0], unit: '' };
  }
  return { name: line.trim(), amount: '', unit: '' };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- Rendering ----------

function render(){
  const app = document.getElementById('app');
  if(!ready){ app.innerHTML = '<div class="loading">Vorratsregal wird geladen ...</div>'; return; }
  app.innerHTML = `
    <div class="app-header">
      <div>
        <h1>Küchenvorrat</h1>
        <p>Gemeinsame Liste. Jeder mit diesem Link sieht und aendert denselben Stand.</p>
      </div>
      <div class="sync-row">
        <span class="sync-time">Stand: ${fmtTime(lastSync)}</span>
        <button class="refresh-btn" id="refresh-btn">Aktualisieren</button>
      </div>
    </div>
    <div class="status-banner">${statusMsg ? escapeHtml(statusMsg) : ''}</div>
    <nav class="tabs">
      <button data-tab="vorrat" class="${activeTab==='vorrat'?'active':''}">Vorrat</button>

function renderAiBox(){
  let inner = '';
  if(aiState.loading){
    inner = '<div class="ai-loading">Vorschlag wird erstellt ...</div>';
  } else if(aiState.error){
    inner = `<div class="ai-error">${escapeHtml(aiState.error)}</div>`;
  } else if(aiState.suggestion){
    const s = aiState.suggestion;
    const missing = (s.ingredients||[]).filter(i => !ingredientAvailable(i.name)).map(i=>i.name);
    const ingHtml = (s.ingredients||[]).map(i => {
      const miss = missing.includes(i.name);
      return `<li class="${miss?'miss':'have'}">${escapeHtml(i.name)}${i.amount?` (${escapeHtml(String(i.amount))}${i.unit?' '+escapeHtml(i.unit):''})`:''}</li>`;
    }).join('');
    const tagsHtml = (s.tags||[]).map(t=>`<span class="recipe-tag">${escapeHtml(t)}</span>`).join('');
    inner = `
      <div class="ai-suggestion">
        <p class="recipe-title">${escapeHtml(s.name || 'Vorschlag')}</p>
        <div class="recipe-tags">${tagsHtml}</div>
        <ul class="ing-list">${ingHtml}</ul>
        ${s.notes ? `<div class="recipe-notes">${escapeHtml(s.notes)}</div>` : ''}

  return `
    <div class="ai-box">
      <div class="status-line" style="margin-bottom:8px;">Nutzt die oben gewaehlten Tag-Filter und euren aktuellen Vorrat. Der Vorschlag ist neu erstellt, kein kopierter Inhalt von einer Rezeptseite.</div>

}

function renderWochenplan(){
  const days = DAYS.map(day => {
    const recipeId = weekplan[day];
    const recipe = recipes.find(r => r.id === recipeId);
    const options = recipes.map(r => `<option value="${r.id}" ${r.id===recipeId?'selected':''}>${escapeHtml(r.name)}</option>`).join('');
    let inner = '';
    if(recipe){
      const missing = missingIngredients(recipe);
      inner = missing.length
        ? `<div class="status-line" style="margin-top:6px;">Fehlt noch: ${missing.map(i=>escapeHtml(i.name)).join(', ')}</div>`
        : `<div class="status-line" style="margin-top:6px; color:#5B7A52;">Alles vorraetig</div>`;
    }
    return `
      <div class="day-block">
        <div class="day-head">
          <span class="day-name">${day}</span>
          <select data-action="set-day-recipe" data-day="${day}">
            <option value="">(kein Gericht)</option>
            ${options}
          </select>
        </div>
        ${inner}
      </div>
    `;
  }).join('');

  const plannedRecipes = Object.values(weekplan).map(id => recipes.find(r=>r.id===id)).filter(Boolean);
  const missingMap = {};
  plannedRecipes.forEach(r => missingIngredients(r).forEach(ing => {
    const key = ing.name.trim().toLowerCase();
    if(!missingMap[key]) missingMap[key] = ing.name;
  }));
  const missingNames = Object.values(missingMap);
  const shoppingHtml = missingNames.length
    ? `<ul class="shopping-list">${missingNames.map(n=>`<li><input type="checkbox">${escapeHtml(n)}</li>`).join('')}</ul>`
    : '<div class="empty-note">Fuer die geplanten Gerichte ist alles da, oder es ist noch nichts geplant.</div>';

  return `
    <div class="card">
      <h2>Wochenplan</h2>
      ${days}
    </div>
    <div class="card">
      <h3>Einkaufsliste aus dem Wochenplan</h3>
      ${shoppingHtml}
    </div>
  `;
}

// ---------- AI: Rezeptvorschlag ----------

async function generateAiSuggestion(){
  aiState = { loading:true, error:'', suggestion:null };
  render();
  try{
    const invText = inventory.length
      ? inventory.map(i => i.name + ' (' + i.amount + (i.unit?' '+i.unit:'') + ', ' + i.location + ')').join(', ')
      : 'aktuell nichts eingetragen';
    const tagText = recipeFilterTags.length ? recipeFilterTags.join(', ') : 'keine besonderen Vorgaben';
    const systemPrompt = 'Du bist ein Kochassistent fuer eine deutschsprachige Kueche. Antworte ausschliesslich mit einem JSON-Objekt, ohne Markdown-Codeblock, ohne Erklaertext davor oder danach. Format: {"name": string, "tags": string[], "ingredients": [{"name": string, "amount": string, "unit": string}], "notes": string}. "notes" enthaelt eine kurze Zubereitung in maximal 3 Saetzen. Das Gericht soll ueberwiegend aus den genannten vorhandenen Zutaten bestehen, ein bis zwei zusaetzliche Grundzutaten (Gewuerze, Oel, Salz) sind erlaubt und muessen nicht vorraetig sein.';
    const userPrompt = 'Vorhandene Vorraete: ' + invText + '. Gewuenschte Eigenschaften: ' + tagText + '. Schlage ein einzelnes, alltagstaugliches Gericht vor.';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await response.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    if(!textBlock) throw new Error('Keine Antwort erhalten');
    const clean = textBlock.text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    aiState = { loading:false, error:'', suggestion: parsed };
  }catch(e){
    console.error(e);
    aiState = { loading:false, error:'Konnte keinen Vorschlag erzeugen. Bitte erneut versuchen.', suggestion:null };
  }
  render();
}

// ---------- AI: Einkauf per Sprache/Text/Foto ----------

const SHOPPING_SYSTEM_PROMPT = 'Du hilfst dabei, eine Einkaufsliste in strukturierte Vorratsdaten fuer einen deutschen Haushalt umzuwandeln. Antworte ausschliesslich mit einem JSON-Array, ohne Markdown-Codeblock, ohne Erklaertext. Jedes Element hat das Format {"name": string, "amount": string, "unit": string, "location": string}. "location" muss exakt einer dieser drei Werte sein: "Gefriertruhe", "Vorratsschrank", "Kuehlschrank". Waehle die Kategorie nach lebensmittelueblicher Lagerung, zum Beispiel Tiefkuehlware in die Gefriertruhe, Milchprodukte und Frischware in den Kuehlschrank, Konserven und Trockenware in den Vorratsschrank. "amount" und "unit" nur befuellen, wenn erkennbar, sonst leere Strings.';

function normalizeShoppingItems(parsed){
  return parsed.map(p => {
    let loc = p.location || '';
    if(loc.indexOf('hlschrank') !== -1) loc = 'Kühlschrank';
    else if(loc.indexOf('efrier') !== -1) loc = 'Gefriertruhe';
    else if(loc.indexOf('orrat') !== -1) loc = 'Vorratsschrank';
    if(!LOCATIONS.includes(loc)) loc = 'Vorratsschrank';
    return { name: p.name || '', amount: p.amount || '', unit: p.unit || '', location: loc };
  });
}

function mergeShoppingItems(newItems){
  shoppingState.items = shoppingState.items ? shoppingState.items.concat(newItems) : newItems;
}

async function callClaudeMessages(messages){
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1200,
      system: SHOPPING_SYSTEM_PROMPT,
      messages
    })
  });
  const data = await response.json();
  const textBlock = (data.content || []).find(b => b.type === 'text');
  if(!textBlock) throw new Error('keine Antwort');
  const clean = textBlock.text.replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(clean);
  if(!Array.isArray(parsed) || parsed.length === 0) throw new Error('leeres Ergebnis');
  return normalizeShoppingItems(parsed);
}

async function parseShoppingText(){
  const textarea = document.getElementById('shopping-text');
  const raw = (textarea ? textarea.value : shoppingState.rawText).trim();
  if(!raw) return;
  shoppingState.rawText = raw;
  shoppingState.parsing = true;
  shoppingState.error = '';
  render();
  try{
    const items = await callClaudeMessages([{ role: 'user', content: raw }]);
    mergeShoppingItems(items);
    shoppingState.rawText = '';
    const ta = document.getElementById('shopping-text');
    if(ta) ta.value = '';
  }catch(e){
    console.error(e);
    shoppingState.error = 'Einkauf konnte nicht erkannt werden. Bitte Text pruefen und erneut versuchen.';
  }
  shoppingState.parsing = false;
  render();
}

function downscaleImage(file, maxDim){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82).split(',')[1]);
      };
      img.onerror = () => reject(new Error('Bild konnte nicht gelesen werden'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden'));
    reader.readAsDataURL(file);
  });
}

async function processShoppingPhoto(file){
  shoppingState.parsing = true;
  shoppingState.error = '';
  render();
  try{
    const base64 = await downscaleImage(file, 1024);
    const items = await callClaudeMessages([{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
        { type: 'text', text: 'Auf dem Foto liegen frisch eingekaufte Lebensmittel oder Produkte ausgepackt bereit, oder es ist ein Kassenbon zu sehen. Erkenne alle einzelnen Artikel und gib sie im vorgegebenen JSON-Format zurueck.' }
      ]
    }]);
    mergeShoppingItems(items);
  }catch(e){
    console.error(e);
    shoppingState.error = 'Foto konnte nicht ausgewertet werden. Bitte erneut versuchen, am besten bei gutem Licht und mit klar erkennbaren Verpackungen.';
  }
  shoppingState.parsing = false;
  render();
}

function startDictation(){
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRec){
    shoppingState.dictationMsg = 'Spracherkennung wird in dieser Ansicht nicht unterstuetzt. Bitte stattdessen das Mikrofon-Symbol der Tastatur nutzen und den Text hier einfuegen.';
    render();
    return;
  }
  try{
    const rec = new SpeechRec();
    rec.lang = 'de-DE';
    rec.continuous = true;
    rec.interimResults = false;
    rec.onresult = function(event){
      let added = '';
      for(let i = event.resultIndex; i < event.results.length; i++){
        if(event.results[i].isFinal) added += event.results[i][0].transcript + ' ';
      }
      if(added){
        const ta = document.getElementById('shopping-text');
        if(ta){ ta.value = (ta.value + ' ' + added).trim(); shoppingState.rawText = ta.value; }
      }
    };
    rec.onerror = function(){
      shoppingState.dictationMsg = 'Mikrofonzugriff war nicht moeglich. Bitte stattdessen das Mikrofon-Symbol der Tastatur nutzen.';
      render();
    };
    rec.start();
    shoppingState.dictationMsg = 'Aufnahme laeuft, bitte sprechen. Danach auf "Einkauf analysieren" tippen.';
    render();
  }catch(e){
    shoppingState.dictationMsg = 'Diktieren ist in dieser Ansicht nicht moeglich. Bitte stattdessen das Mikrofon-Symbol der Tastatur nutzen.';
    render();
  }
}

// ---------- Events ----------

function bindEvents(){
  const refreshBtn = document.getElementById('refresh-btn');
  if(refreshBtn) refreshBtn.onclick = () => { statusMsg=''; refreshFromServer(true); };

  document.querySelectorAll('nav.tabs button').forEach(btn => {
    btn.onclick = () => { activeTab = btn.dataset.tab; render(); };
  });

  document.querySelectorAll('[data-action="add-item"]').forEach(btn => {
    btn.onclick = async () => {
      const loc = btn.dataset.loc;
      const nameInput = document.querySelector(`.new-item-name[data-loc="${loc}"]`);
      const qtyInput = document.querySelector(`.new-item-qty[data-loc="${loc}"]`);
      const unitInput = document.querySelector(`.new-item-unit[data-loc="${loc}"]`);
      const name = nameInput.value.trim();
      if(!name) return;
      const newItem = { id: uid(), name, amount: qtyInput.value || '1', unit: unitInput.value.trim(), location: loc };
      inventory = await mutateShared('vorrat-inventory', [], (inv) => { inv.push(newItem); return inv; });
      render();
    };
  });

  document.querySelectorAll('[data-action="inc-item"], [data-action="dec-item"], [data-action="del-item"]').forEach(btn => {
    btn.onclick = async () => {
      const row = btn.closest('.item-row');
      const id = row.dataset.itemId;
      const action = btn.dataset.action;
      inventory = await mutateShared('vorrat-inventory', [], (inv) => {
        const item = inv.find(i => i.id === id);
        if(!item) return inv;
        if(action === 'del-item') return inv.filter(i => i.id !== id);
        let n = parseFloat(item.amount) || 0;
        n += action === 'inc-item' ? 1 : -1;
        if(n <= 0) return inv.filter(i => i.id !== id);
        item.amount = n;
        return inv;
      });
      render();
    };
  });

  document.querySelectorAll('[data-action="toggle-filter-tag"]').forEach(chip => {
    chip.onclick = () => {
      const t = chip.dataset.tag;
      recipeFilterTags = recipeFilterTags.includes(t) ? recipeFilterTags.filter(x=>x!==t) : [...recipeFilterTags, t];
      render();
    };
  });

  document.querySelectorAll('[data-action="toggle-draft-tag"]').forEach(chip => {
    chip.onclick = () => {
      const t = chip.dataset.tag;
      window.__draftTags = window.__draftTags || [];
      window.__draftTags = window.__draftTags.includes(t) ? window.__draftTags.filter(x=>x!==t) : [...window.__draftTags, t];
      render();
    };
  });

  const addIngBtn = document.querySelector('[data-action="add-draft-ing"]');
  if(addIngBtn) addIngBtn.onclick = () => { draftIngredients.push({name:'',amount:'',unit:''}); render(); };

  document.querySelectorAll('[data-action="remove-draft-ing"]').forEach(btn => {
    btn.onclick = () => { draftIngredients.splice(parseInt(btn.dataset.idx),1); render(); };
  });

  document.querySelectorAll('[data-action^="draft-ing-"]').forEach(inp => {
    inp.oninput = () => {
      const idx = parseInt(inp.dataset.idx);
      const field = inp.dataset.action === 'draft-ing-name' ? 'name' : inp.dataset.action === 'draft-ing-amount' ? 'amount' : 'unit';
      draftIngredients[idx][field] = inp.value;
    };
  });

  const nameField = document.getElementById('new-recipe-name');
  if(nameField) nameField.oninput = () => { window.__draftName = nameField.value; };
  const notesField = document.getElementById('new-recipe-notes');
  if(notesField) notesField.oninput = () => { window.__draftNotes = notesField.value; };

  const parseBtn = document.querySelector('[data-action="parse-paste"]');
  if(parseBtn) parseBtn.onclick = () => {
    const raw = document.getElementById('paste-area').value;
    const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length === 0) return;
    window.__draftName = lines[0];
    draftIngredients = lines.slice(1).map(parseIngredientLine).filter(Boolean);
    render();
  };

  const saveRecipeBtn = document.querySelector('[data-action="save-recipe"]');
  if(saveRecipeBtn) saveRecipeBtn.onclick = async () => {
    const name = document.getElementById('new-recipe-name').value.trim();
    if(!name){ document.getElementById('new-recipe-name').focus(); return; }
    const ingredients = draftIngredients.filter(i => i.name.trim());
    const notes = document.getElementById('new-recipe-notes').value.trim();
    const tags = window.__draftTags || [];
    const newRecipe = { id: uid(), name, tags, ingredients, notes };
    recipes = await mutateShared('vorrat-recipes', [], (list) => { list.push(newRecipe); return list; });
    draftIngredients = [];
    window.__draftTags = [];
    window.__draftName = '';
    window.__draftNotes = '';
    render();
  };

  document.querySelectorAll('[data-action="del-recipe"]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      recipes = await mutateShared('vorrat-recipes', [], (list) => list.filter(r => r.id !== id));
      render();
    };
  });

  document.querySelectorAll('[data-action="plan-recipe"]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const freeDay = DAYS.find(d => !weekplan[d]) || DAYS[0];
      weekplan = await mutateShared('vorrat-weekplan', {}, (wp) => { wp[freeDay] = id; return wp; });
      activeTab = 'wochenplan';
      render();
    };
  });

  document.querySelectorAll('[data-action="set-day-recipe"]').forEach(sel => {
    sel.onchange = async () => {
      const day = sel.dataset.day;
      const val = sel.value;
      weekplan = await mutateShared('vorrat-weekplan', {}, (wp) => { if(val) wp[day]=val; else delete wp[day]; return wp; });
      render();
    };
  });

  document.querySelectorAll('[data-action="generate-ai-suggestion"]').forEach(btn => {
    btn.onclick = () => generateAiSuggestion();
  });
  const discardBtn = document.querySelector('[data-action="discard-ai-suggestion"]');
  if(discardBtn) discardBtn.onclick = () => { aiState = {loading:false, error:'', suggestion:null}; render(); };
  const saveAiBtn = document.querySelector('[data-action="save-ai-suggestion"]');
  if(saveAiBtn) saveAiBtn.onclick = async () => {
    const s = aiState.suggestion;
    if(!s) return;
    const validTags = (s.tags||[]).filter(t => TAGS.includes(t));
    const newRecipe = { id: uid(), name: s.name || 'KI-Vorschlag', tags: validTags, ingredients: s.ingredients || [], notes: s.notes || '' };
    recipes = await mutateShared('vorrat-recipes', [], (list) => { list.push(newRecipe); return list; });
    aiState = {loading:false, error:'', suggestion:null};
    render();
  };

  const triggerPhotoBtn = document.querySelector('[data-action="trigger-photo"]');
  if(triggerPhotoBtn) triggerPhotoBtn.onclick = () => {
    const input = document.getElementById('shopping-photo-input');
    if(input) input.click();
  };
  const photoInput = document.getElementById('shopping-photo-input');
  if(photoInput) photoInput.onchange = (e) => {
    const file = e.target.files && e.target.files[0];
    if(file) processShoppingPhoto(file);
    photoInput.value = '';
  };

  const dictateBtn = document.querySelector('[data-action="start-dictation"]');
  if(dictateBtn) dictateBtn.onclick = () => {
    const ta = document.getElementById('shopping-text');
    if(ta) shoppingState.rawText = ta.value;
    startDictation();
  };

  const shoppingTextarea = document.getElementById('shopping-text');
  if(shoppingTextarea) shoppingTextarea.oninput = () => { shoppingState.rawText = shoppingTextarea.value; };

  const parseShopBtn = document.querySelector('[data-action="parse-shopping"]');
  if(parseShopBtn) parseShopBtn.onclick = () => parseShoppingText();

  document.querySelectorAll('[data-action="remove-shop-item"]').forEach(btn => {
    btn.onclick = () => { shoppingState.items.splice(parseInt(btn.dataset.idx),1); render(); };
  });

  document.querySelectorAll('[data-action="shop-item-name"], [data-action="shop-item-amount"], [data-action="shop-item-unit"]').forEach(inp => {
    inp.oninput = () => {
      const idx = parseInt(inp.dataset.idx);
      const field = inp.dataset.action === 'shop-item-name' ? 'name' : inp.dataset.action === 'shop-item-amount' ? 'amount' : 'unit';
      shoppingState.items[idx][field] = inp.value;
    };
  });

  document.querySelectorAll('[data-action="shop-item-location"]').forEach(sel => {
    sel.onchange = () => { shoppingState.items[parseInt(sel.dataset.idx)].location = sel.value; };
  });

  const confirmShopBtn = document.querySelector('[data-action="confirm-shopping"]');
  if(confirmShopBtn) confirmShopBtn.onclick = async () => {
    const itemsToAdd = (shoppingState.items || []).filter(it => it.name && it.name.trim());
    inventory = await mutateShared('vorrat-inventory', [], (inv) => {
      itemsToAdd.forEach(it => {
        const existing = inv.find(x => x.location === it.location && x.name.trim().toLowerCase() === it.name.trim().toLowerCase());
        if(existing){
          const a = parseFloat(String(existing.amount).replace(',','.')) || 0;
          const b = parseFloat(String(it.amount).replace(',','.')) || 0;
          if(a && b){ existing.amount = a + b; }
        } else {
          inv.push({ id: uid(), name: it.name.trim(), amount: it.amount || '1', unit: it.unit || '', location: it.location });
        }
      });
      return inv;
    });
    shoppingState = { rawText:'', parsing:false, error:'', items:null, dictationMsg:'' };
    render();
  };

  const discardShopBtn = document.querySelector('[data-action="discard-shopping"]');
  if(discardShopBtn) discardShopBtn.onclick = () => { shoppingState.items = null; render(); };
}

loadAll();
setInterval(() => refreshFromServer(false), 25000);
</script>
</body>
</html>
